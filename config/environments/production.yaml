name: IotEdgeGateway
env: production

paths:
  www_root: www
  log_file: /var/log/iotgw/iotgw.log

logging:
  level: info

network:
  http_api:
    host: 0.0.0.0
    port: 8081

mqtt:
  enabled: true
  broker_host: "127.0.0.1"
  broker_port: 1883
  client_id: iotgw-rk3568
  username: ""
  password: ""
  keepalive_sec: 30
  clean_session: true
  topic_prefix: "iotgw/dev/"

camera:
  device: "/dev/video0"

storage:
  enabled: true
  db_path: "data/iotgw.db"
  retention_days: 7

control:
  manual_override_ms: 30000
