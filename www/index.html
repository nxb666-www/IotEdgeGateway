<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK3568 智能控制中心</title>
    <style>
        :root {
            --primary: #5c67f2;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --bg: #f0f2f5;
            --card: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 0 25px;
            border-radius: 16px;
            min-height: 60px;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .status-tag {
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .tabs {
            display: flex;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 1px solid #e5e7eb;
        }

        .tab-btn {
            flex: 1;
            height: 42px;
            border: 0;
            background: #fff;
            color: #64748b;
            font-weight: 800;
            cursor: pointer;
        }

        .tab-btn.active {
            color: var(--primary);
            background: #eef2ff;
            border-bottom: 3px solid var(--primary);
        }

        .page {
            display: none;
            flex: 1;
            min-height: 0;
        }

        .page.active {
            display: flex;
        }

        /* 主区域布局 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1f2937;
        }

        /* 视频区域 */
        .video-box {
            width: 100%;
            background: #000;
            border-radius: 12px;
            flex: 1;
            overflow: hidden;
            position: relative;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        /* 按钮通用 */
        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 13px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-cap {
            background: var(--success);
        }

        .btn-rec {
            background: var(--danger);
        }

        .btn-stream-start {
            background: var(--info);
        }

        .btn-stream-stop {
            background: #64748b;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* 控制面板 */
        .control-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid #edf2f7;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--primary);
        }

        .dir-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-dir {
            background: #e2e8f0;
            color: #64748b;
            padding: 6px;
            border-radius: 6px;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-dir.active {
            background: #fff;
            color: var(--primary);
            border-color: var(--primary);
            font-weight: bold;
        }

        /* 开关手柄 */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        /* 日志窗口 - 填满剩余空间 */
        .log-container {
            background: #0f172a;
            color: #38bdf8;
            border-radius: 12px;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.5;
            border: 1px solid #1e293b;
        }

        .log-line {
            margin-bottom: 4px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 2px;
        }

        .log-time {
            color: #94a3b8;
            margin-right: 8px;
        }

        /* 底部传感器卡片 */
        .sensor-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .s-card {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .s-val {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary);
            margin: 4px 0;
        }

        .s-unit {
            font-size: 12px;
            color: #94a3b8;
        }

        .history-tools {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 8px;
            margin-bottom: 10px;
        }

        .history-tools select {
            height: 36px;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 0 8px;
            background: #fff;
        }

        .history-table-wrap {
            max-height: 180px;
            overflow: auto;
            border: 1px solid #edf2f7;
            border-radius: 8px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .history-table th,
        .history-table td {
            padding: 8px;
            border-bottom: 1px solid #edf2f7;
            text-align: left;
            white-space: nowrap;
        }

        .history-table th {
            background: #f8fafc;
            color: #64748b;
            position: sticky;
            top: 0;
        }

        .history-empty {
            text-align: center;
            color: #94a3b8;
        }

        .history-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            width: 100%;
            min-height: 0;
        }

        .history-side {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .history-side label {
            font-size: 13px;
            color: #64748b;
            font-weight: 700;
        }

        .history-side select {
            width: 100%;
            height: 36px;
            margin: 6px 0 12px;
            border: 1px solid #dbe3ef;
            border-radius: 8px;
            padding: 0 8px;
            background: #fff;
        }

        .history-chart {
            height: 220px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="header">
        <div style="font-size: 20px; font-weight: 800; letter-spacing: 1px;">RK3568 智能网关控制系统</div>
        <div class="status-tag" id="conn_status">设备在线</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-page="monitor_page">实时监控</button>
        <button class="tab-btn" data-page="history_page">历史数据</button>
    </div>

    <section id="monitor_page" class="page active">
    <div class="main-grid">
        <!-- 左侧 -->
        <div class="column">
            <div class="card" style="flex: 1;">
                <div class="card-title">实时画面监控</div>
                <div class="video-box">
                    <img id="videoPlayer" src="" alt="视频流">
                </div>
                <div class="video-bar">
                    <button id="streamStartBtn" class="btn btn-stream-start">开始推流</button>
                    <button id="streamStopBtn" class="btn btn-stream-stop" disabled>停止推流</button>
                    <button id="snapshotBtn" class="btn btn-cap">抓拍照片</button>
                    <button id="recordBtn" class="btn btn-rec">视频录制</button>
                </div>
            </div>

            <div class="sensor-row">
                <div class="s-card">
                    <div>温度</div>
                    <div class="s-val" id="val_temp">--</div>
                    <div class="s-unit">°C</div>
                </div>
                <div class="s-card">
                    <div>湿度</div>
                    <div class="s-val" id="val_humi">--</div>
                    <div class="s-unit">% RH</div>
                </div>
                <div class="s-card">
                    <div>光照强度</div>
                    <div class="s-val" id="val_light">--</div>
                    <div class="s-unit">Lux</div>
                </div>
                <div class="s-card">
                    <div>红外检测</div>
                    <div class="s-val" id="val_ir" style="font-size:16px;">--</div>
                    <div class="s-unit">Status</div>
                </div>
            </div>
        </div>

        <!-- 右侧 -->
        <div class="column">
            <!-- 控制卡片 -->
            <div class="card">
                <div class="card-title">硬件外设控制</div>

                <div class="control-item">
                    <div class="label-row"><span>LED 照明灯</span><label class="switch"><input type="checkbox" id="led_sw"
                                onchange="updateLed()"><span class="slider"></span></label></div>
                    <input type="range" id="led_br" value="50" onchange="updateLed()">
                </div>

                <div class="control-item">
                    <div class="label-row"><span>直流电机控制</span><label class="switch"><input type="checkbox" id="motor_sw"
                                onchange="updateMotor()"><span class="slider"></span></label></div>
                    <input type="range" id="motor_sp" value="30" onchange="updateMotor()">
                    <div class="dir-btns">
                        <button id="dir_f" class="btn-dir active" onclick="setMotorDirUser(0)">正向旋转</button>
                        <button id="dir_r" class="btn-dir" onclick="setMotorDirUser(1)">反向旋转</button>
                    </div>
                </div>

                <div class="control-item" style="border-left: 4px solid var(--warning); margin-bottom: 0;">
                    <div class="label-row"><span>紧急蜂鸣报警</span><label class="switch"><input type="checkbox"
                                id="buzzer_sw" onchange="cmd('buzzer', this.checked?'on':'off')"><span
                                class="slider"></span></label></div>
                </div>
            </div>

            <!-- 日志卡片 -->
            <div class="card" style="flex: 1; min-height: 0;">
                <div class="card-title">系统运行日志</div>
                <div class="log-container" id="log_box">
                    <div class="log-line"><span class="log-time">[00:00:00]</span>系统初始化完成...</div>
                </div>
            </div>
        </div>
    </div>
    </section>

    <section id="history_page" class="page">
        <div class="history-grid">
            <div class="history-side">
                <div class="card">
                    <div class="card-title">查询条件</div>
                    <label for="history_device">选择设备</label>
                    <select id="history_device">
                        <option value="temp">温度传感器</option>
                        <option value="humi">湿度传感器</option>
                        <option value="light">光照传感器</option>
                        <option value="ir">红外传感器</option>
                    </select>
                    <label for="history_limit">显示条数</label>
                    <select id="history_limit">
                        <option value="20">最近 20 条</option>
                        <option value="50">最近 50 条</option>
                        <option value="100">最近 100 条</option>
                    </select>
                    <button id="historyQueryBtn" class="btn btn-stream-start">查询历史数据</button>
                </div>
                <div class="card">
                    <div class="card-title">最新数据</div>
                    <div class="sensor-row" style="grid-template-columns: 1fr 1fr;">
                        <div class="s-card"><div>温度</div><div class="s-val" id="latest_temp">--</div><div class="s-unit">°C</div></div>
                        <div class="s-card"><div>湿度</div><div class="s-val" id="latest_humi">--</div><div class="s-unit">% RH</div></div>
                        <div class="s-card"><div>光照</div><div class="s-val" id="latest_light">--</div><div class="s-unit">Lux</div></div>
                        <div class="s-card"><div>红外</div><div class="s-val" id="latest_ir" style="font-size:16px;">--</div><div class="s-unit">Status</div></div>
                    </div>
                </div>
            </div>
            <div class="column">
                <div class="card">
                    <div class="card-title">数据可视化</div>
                    <canvas id="history_chart" class="history-chart" width="900" height="220"></canvas>
                </div>
                <div class="card" style="flex: 1; min-height: 0;">
                    <div class="card-title">数据库历史遥测数据</div>
                    <div class="history-table-wrap" style="flex: 1;">
                        <table class="history-table">
                            <thead><tr><th>数值</th><th>设备时间戳</th><th>入库时间</th></tr></thead>
                            <tbody id="history_body">
                                <tr><td colspan="3" class="history-empty">暂无历史数据</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // ========== 视频流核心配置 ==========
        const LIVE_JPG_URL = '/stream/live.jpg';
        const API_START_STREAM = '/api/camera/start_stream';
        const API_STOP_STREAM = '/api/camera/stop_stream';
        const API_START_RECORD = '/api/camera/start_record';
        const API_STOP_RECORD = '/api/camera/stop_record';
        const API_SNAPSHOT = '/api/camera/snapshot';

        // 全局状态
        let streamStarted = false;
        let recordStarted = false;
        let frameTimer = null;
        let frameTimeoutTimer = null;
        let frameSeq = 0;
        let frameLoading = false;

        // DOM元素
        const video = document.getElementById('videoPlayer');
        const streamStartBtn = document.getElementById('streamStartBtn');
        const streamStopBtn = document.getElementById('streamStopBtn');
        const snapshotBtn = document.getElementById('snapshotBtn');
        const recordBtn = document.getElementById('recordBtn');
        const historyDevice = document.getElementById('history_device');
        const historyLimit = document.getElementById('history_limit');
        const historyQueryBtn = document.getElementById('historyQueryBtn');
        const historyBody = document.getElementById('history_body');
        const historyChart = document.getElementById('history_chart');

        let currentDir = 0;
        let statusBusy = false;
        let controlBusy = false;
        let controlPending = false;

        // 写入日志函数（增强，兼容视频流日志）
        function addLog(msg) {
            const box = document.getElementById('log_box');
            const time = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = 'log-line';
            line.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            box.appendChild(line);
            box.scrollTop = box.scrollHeight; // 自动滚动到底部
        }

        // 通用请求函数
        async function sendCommand(url, options = {}) {
            try {
                const res = await fetch(url, options);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            } catch (err) {
                addLog(`接口请求失败: ${err.message}`);
                console.error('API Error:', err);
                throw err;
            }
        }

        function nextFrameUrl() {
            return `${LIVE_JPG_URL}?t=${Date.now()}`;
        }

        function clearFrameTimeout() {
            if (frameTimeoutTimer) {
                clearTimeout(frameTimeoutTimer);
                frameTimeoutTimer = null;
            }
        }

        function scheduleNextFrame(delay) {
            if (!streamStarted) return;
            if (frameTimer) clearTimeout(frameTimer);
            frameTimer = setTimeout(loadNextFrame, delay);
        }

        function loadNextFrame() {
            if (!streamStarted || frameLoading) return;
            const seq = ++frameSeq;
            const img = new Image();
            frameLoading = true;
            clearFrameTimeout();
            img.onload = () => {
                if (streamStarted && seq === frameSeq) {
                    video.src = img.src;
                }
                frameLoading = false;
                clearFrameTimeout();
                scheduleNextFrame(100);
            };
            img.onerror = () => {
                frameLoading = false;
                clearFrameTimeout();
                scheduleNextFrame(300);
            };
            frameTimeoutTimer = setTimeout(() => {
                if (streamStarted && seq === frameSeq) {
                    frameLoading = false;
                    scheduleNextFrame(300);
                }
            }, 1500);
            img.src = nextFrameUrl();
        }

        // ========== 视频流控制逻辑 ==========
        async function startStream() {
            if (streamStarted) return;
            streamStarted = true;
            streamStartBtn.disabled = true;
            try {
                addLog('正在启动视频流...');
                const res = await sendCommand(API_START_STREAM);
                addLog(`视频流已启动(${res.backend || 'ffmpeg'}), 正在获取画面...`);
                loadNextFrame();
                streamStopBtn.disabled = false;
            } catch (err) {
                streamStarted = false;
                streamStartBtn.disabled = false;
                addLog(`视频流启动失败: ${err.message}`);
            }
        }

        async function stopStream() {
            if (!streamStarted) return;
            try {
                addLog('正在停止视频流...');
                if (frameTimer) clearTimeout(frameTimer);
                clearFrameTimeout();
                frameLoading = false;
                video.src = '';
                streamStarted = false;
                streamStartBtn.disabled = false;
                streamStopBtn.disabled = true;
                await sendCommand(API_STOP_STREAM);
                addLog('视频流已停止');
            } catch (err) {
                addLog(`停止视频流出错: ${err.message}`);
            }
        }

        async function takeSnapshot() {
            try {
                addLog('正在拍照...');
                const res = await sendCommand(API_SNAPSHOT);
                addLog(`拍照${res.result === 'ok' ? '成功' : '失败'}，文件: ${res.file || '/www'}`);
            } catch (err) {
                addLog(`拍照失败: ${err.message}`);
            }
        }

        async function toggleRecord() {
            if (!streamStarted) {
                addLog('请先启动视频流再进行录像');
                return;
            }

            if (!recordStarted) {
                // 开始录像
                try {
                    addLog('正在启动录像...');
                    const res = await sendCommand(API_START_RECORD);
                    recordStarted = true;
                    recordBtn.innerHTML = '停止录制';
                    addLog(`录像已开始，文件: ${res.file || '/www'}`);
                } catch (err) {
                    addLog(`录像启动失败: ${err.message}`);
                }
            } else {
                // 停止录像
                try {
                    addLog('正在停止录像...');
                    const res = await sendCommand(API_STOP_RECORD);
                    recordStarted = false;
                    recordBtn.innerHTML = '视频录制';
                    addLog(`录像${res.result === 'ok' ? '已保存' : '保存失败'}，文件: ${res.file || '/www'}`);
                } catch (err) {
                    addLog(`停止录像出错: ${err.message}`);
                }
            }
        }

      async function cmd() {
    if (controlBusy) {
        controlPending = true;
        return;
    }

    controlBusy = true;
    controlPending = false;

    const payload = {
        led_on: document.getElementById('led_sw').checked ? 1 : 0,
        led_br: parseInt(document.getElementById('led_br').value),
        motor_on: document.getElementById('motor_sw').checked ? 1 : 0,
        motor_sp: parseInt(document.getElementById('motor_sp').value),
        motor_dir: currentDir,
        buzzer: document.getElementById('buzzer_sw').checked ? 1 : 0
    };

    const msg = {
        type: "control",
        payload: payload
    };

    addLog(`发送指令: ${JSON.stringify(msg)}`);

    try {
        const res = await fetch('/api/control', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(msg)
        });
        if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
        }
    } catch (err) {
        addLog(`指令发送失败: ${err.message}`);
    } finally {
        controlBusy = false;
        if (controlPending) {
            setTimeout(cmd, 80);
        }
    }
}


        function updateLed() {
            const sw = document.getElementById('led_sw').checked ? '开启' : '关闭';
            const br = document.getElementById('led_br').value;
            addLog(`LED调整: ${sw}, 亮度 ${br}%`);
            cmd();
        }

        function setMotorDirUI(dir) {
    currentDir = dir;

    document.getElementById('dir_f').classList.toggle('active', dir === 0);
    document.getElementById('dir_r').classList.toggle('active', dir === 1);
}

function setMotorDirUser(dir) {
    setMotorDirUI(dir);
    addLog(`电机方向切换: ${dir === 0 ? '正转' : '反转'}`);
    cmd();   // 只有用户操作才发
}



        function updateMotor() {
    const sw = document.getElementById('motor_sw').checked ? '开启' : '关闭';
    const sp = document.getElementById('motor_sp').value;

    cmd();

    addLog(
        `电机控制: ${sw}, 速度 ${sp}%, 方向 ${currentDir === 0 ? '正转' : '反转'}`
    );
}

        function switchPage(pageId) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === pageId);
            });
            document.querySelectorAll('.page').forEach(page => {
                page.classList.toggle('active', page.id === pageId);
            });
            if (pageId === 'history_page') {
                queryHistory();
            }
        }

        function formatTime(v) {
            if (v === undefined || v === null || v === '') return '--';
            const n = Number(v);
            if (!Number.isFinite(n) || n <= 0) return String(v);
            const ms = n > 1000000000000 ? n : n * 1000;
            return new Date(ms).toLocaleString();
        }

        function drawHistory(values, title) {
            if (!historyChart) return;
            const ctx = historyChart.getContext('2d');
            const w = historyChart.width;
            const h = historyChart.height;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, w, h);

            const left = 50, right = w - 18, top = 32, bottom = h - 24;
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = top + (bottom - top) * i / 4;
                ctx.beginPath();
                ctx.moveTo(left, y);
                ctx.lineTo(right, y);
                ctx.stroke();
            }

            ctx.fillStyle = '#64748b';
            ctx.font = '14px sans-serif';
            ctx.fillText(title || '历史趋势', left, 20);
            if (!values.length) {
                ctx.fillStyle = '#94a3b8';
                ctx.fillText('暂无历史数据', w / 2 - 42, h / 2);
                return;
            }

            const min = Math.min(...values);
            const max = Math.max(...values);
            const span = max === min ? 1 : max - min;
            ctx.strokeStyle = '#5c67f2';
            ctx.lineWidth = 3;
            ctx.beginPath();
            values.forEach((value, i) => {
                const x = values.length === 1 ? (left + right) / 2 : left + (right - left) * i / (values.length - 1);
                const y = bottom - (value - min) / span * (bottom - top);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        async function queryHistory() {
            const deviceId = historyDevice.value;
            const limit = historyLimit.value;
            historyQueryBtn.disabled = true;
            try {
                const data = await sendCommand(`/api/history?device_id=${encodeURIComponent(deviceId)}&limit=${limit}`);
                const items = Array.isArray(data.items) ? data.items.slice().reverse() : [];
                if (!items.length) {
                    historyBody.innerHTML = '<tr><td colspan="3" class="history-empty">暂无历史数据</td></tr>';
                    drawHistory([], historyDevice.options[historyDevice.selectedIndex].text);
                    addLog('历史数据查询完成: 0 条');
                    return;
                }

                historyBody.innerHTML = items.map(item => {
                    const value = Number(item.value);
                    const valueText = Number.isFinite(value) ? value.toFixed(2) : '--';
                    return `<tr><td>${valueText}</td><td>${formatTime(item.ts)}</td><td>${formatTime(item.created_at)}</td></tr>`;
                }).join('');
                drawHistory(items.map(item => Number(item.value)).filter(Number.isFinite),
                    historyDevice.options[historyDevice.selectedIndex].text);
                addLog(`历史数据查询完成: ${items.length} 条`);
            } catch (err) {
                historyBody.innerHTML = '<tr><td colspan="3" class="history-empty">历史数据查询失败</td></tr>';
                addLog(`历史数据查询失败: ${err.message}`);
            } finally {
                historyQueryBtn.disabled = false;
            }
        }

        // ========== 事件绑定 ==========
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => switchPage(btn.dataset.page);
        });
        // 视频流按钮绑定
        streamStartBtn.onclick = startStream;
        streamStopBtn.onclick = stopStream;
        snapshotBtn.onclick = takeSnapshot;
        recordBtn.onclick = toggleRecord;
        historyQueryBtn.onclick = queryHistory;

        // 定时拉取传感器数据
        function pollStatus() {
            if (statusBusy) return;
            statusBusy = true;
            fetch('/api/status').then(r => r.json()).then(data => {
                // 渲染传感器数据
                document.getElementById('val_temp').innerText = data.temp || '--';
                document.getElementById('val_humi').innerText = data.humi || '--';
                document.getElementById('val_light').innerText = data.light || '--';
                const irBox = document.getElementById('val_ir');
                const irActive = Number(data.ir) === 1;
                irBox.innerText = irActive ? "有人" : "安全";
                irBox.style.color = irActive ? "var(--danger)" : "var(--success)";
                document.getElementById('latest_temp').innerText = data.temp || '--';
                document.getElementById('latest_humi').innerText = data.humi || '--';
                document.getElementById('latest_light').innerText = data.light || '--';
                const latestIr = document.getElementById('latest_ir');
                latestIr.innerText = irActive ? "有人" : "安全";
                latestIr.style.color = irActive ? "var(--danger)" : "var(--success)";

                // 恢复连接状态
                document.getElementById('conn_status').innerText = "设备在线";
                document.getElementById('conn_status').style.color = "#fff";
            }).catch(e => {
                document.getElementById('conn_status').innerText = "连接断开";
                document.getElementById('conn_status').style.color = "#ff4d4d";
                addLog(`传感器数据获取失败: ${e.message}`);
            }).finally(() => {
                statusBusy = false;
            });
        }

        pollStatus();
        setInterval(pollStatus, 1000);

        // 初始化日志
        addLog('[系统] 页面加载完成，设备控制就绪');
    </script>

</body>
