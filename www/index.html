<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK3568 智能网关</title>
    <style>
        :root {
            --bg: #eef2f7;
            --panel: #ffffff;
            --line: #d8e0eb;
            --text: #182230;
            --muted: #667085;
            --primary: #2563eb;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --dark: #111827;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
        }
        .app { min-height: 100vh; display: flex; flex-direction: column; padding: 14px; gap: 10px; }
        .topbar {
            height: 58px;
            background: var(--dark);
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
        }
        .brand { font-size: 20px; font-weight: 900; }
        .brand small { display: block; font-size: 12px; color: #cbd5e1; font-weight: 500; margin-top: 2px; }
        .status-row { display: flex; align-items: center; gap: 10px; }
        .badge {
            min-width: 76px;
            height: 30px;
            padding: 0 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1f2937;
            border: 1px solid #374151;
            font-weight: 800;
            color: #dbeafe;
        }
        .tabs { height: 42px; background: var(--panel); border: 1px solid var(--line); display: flex; }
        .tab-btn {
            height: 40px;
            padding: 0 20px;
            border: 0;
            border-right: 1px solid var(--line);
            background: transparent;
            color: var(--muted);
            font-weight: 800;
            cursor: pointer;
        }
        .tab-btn.active { color: var(--primary); background: #eff6ff; box-shadow: inset 0 -3px 0 var(--primary); }
        .page { display: none; flex: 1; min-height: 0; }
        .page.active { display: block; }
        .monitor-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            gap: 10px;
            height: calc(100vh - 132px);
            min-height: 580px;
        }
        .history-grid {
            display: grid;
            grid-template-columns: 300px minmax(0, 1fr);
            gap: 10px;
            height: calc(100vh - 132px);
            min-height: 580px;
        }
        .stack { min-height: 0; display: flex; flex-direction: column; gap: 10px; }
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .card-head {
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            border-bottom: 1px solid var(--line);
            font-weight: 900;
        }
        .card-body { padding: 12px; min-height: 0; }
        .grow { flex: 1; }
        .sensor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .sensor {
            background: #f8fafc;
            border: 1px solid var(--line);
            padding: 12px;
            text-align: center;
        }
        .sensor .name { color: var(--muted); font-size: 12px; font-weight: 800; }
        .sensor .value { margin-top: 6px; font-size: 26px; font-weight: 900; }
        .sensor .unit { margin-top: 2px; color: #94a3b8; font-size: 12px; }
        .video-frame {
            flex: 1;
            min-height: 0;
            background: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #94a3b8;
            font-weight: 800;
        }
        .video-frame img { width: 100%; height: 100%; object-fit: contain; display: none; }
        .video-actions, .control-actions, .media-actions { display: grid; gap: 8px; }
        .video-actions { grid-template-columns: repeat(4, 1fr); }
        .control-actions { grid-template-columns: repeat(2, 1fr); }
        .media-actions { grid-template-columns: repeat(3, 1fr); }
        button, select, input { font: inherit; }
        .btn {
            height: 34px;
            border: 0;
            color: white;
            background: var(--primary);
            cursor: pointer;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 14px;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn.secondary { background: #475569; }
        .btn.success { background: var(--success); }
        .btn.danger { background: var(--danger); }
        .btn.warning { background: var(--warning); }
        .btn.active { outline: 3px solid rgba(37, 99, 235, 0.24); box-shadow: inset 0 0 0 2px #bfdbfe; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn.small { height: 28px; padding: 0 10px; font-size: 12px; }
        .actions-inline { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .switch { accent-color: var(--primary); }
        .control-item { padding: 12px; border: 1px solid var(--line); background: #f8fafc; margin-bottom: 10px; }
        .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .row + .row { margin-top: 10px; }
        .row.active { color: var(--primary); }
        .label { font-weight: 900; }
        input[type="range"] { width: 100%; }
        .switch { width: 20px; height: 20px; }
        .log-box {
            flex: 1;
            min-height: 0;
            overflow: auto;
            background: #0f172a;
            color: #7dd3fc;
            padding: 10px;
            white-space: pre-wrap;
            font-family: Consolas, "Microsoft YaHei", monospace;
            font-size: 12px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 9px 10px; border-bottom: 1px solid #edf2f7; text-align: left; }
        th { background: #f8fafc; color: #475569; font-size: 12px; }
        .table-wrap { overflow: auto; min-height: 0; }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.58);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 20;
        }
        .modal.show { display: flex; }
        .modal-panel {
            width: min(980px, 96vw);
            max-height: 88vh;
            background: white;
            border: 1px solid var(--line);
            display: flex;
            flex-direction: column;
        }
        .modal-body { padding: 12px; overflow: auto; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .photo-card { border: 1px solid var(--line); color: var(--text); text-decoration: none; background: #f8fafc; }
        .photo-card img { width: 100%; height: 110px; object-fit: cover; display: block; }
        .photo-card div { padding: 8px; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .photo-card .btn { width: calc(100% - 16px); margin: 0 8px 8px; }
        @media (max-width: 900px) {
            .monitor-grid, .history-grid { grid-template-columns: 1fr; height: auto; }
            .sensor-grid, .video-actions { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="topbar">
        <div class="brand">RK3568 智能网关<small>Web 控制中心</small></div>
        <div class="status-row">
            <div class="badge" id="transport_status" title="当前通信方式">MQTT</div>
            <div class="badge" id="conn_status">连接中</div>
        </div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" data-page="monitor">实时监控</button>
        <button class="tab-btn" data-page="history">历史记录</button>
    </nav>

    <section id="monitor" class="page active">
        <div class="monitor-grid">
            <div class="stack">
                <div class="card">
                    <div class="card-head"><span>实时数据</span><span id="sensor_update_time" style="font-size:12px;color:var(--muted);">等待数据</span></div>
                    <div class="card-body">
                        <div class="sensor-grid">
                            <div class="sensor"><div class="name">温度</div><div class="value" id="val_temp">--</div><div class="unit">℃</div></div>
                            <div class="sensor"><div class="name">湿度</div><div class="value" id="val_humi">--</div><div class="unit">%RH</div></div>
                            <div class="sensor"><div class="name">光照</div><div class="value" id="val_light">--</div><div class="unit">Lux</div></div>
                            <div class="sensor"><div class="name">红外</div><div class="value" id="val_ir">--</div><div class="unit">Status</div></div>
                        </div>
                    </div>
                </div>

                <div class="card grow">
                    <div class="card-head"><span>实时视频</span><span id="video_state" style="font-size:12px;color:var(--muted);">未启动</span></div>
                    <div class="video-frame" id="videoBox">
                        <span id="videoHint">点击“开始推流”后显示画面</span>
                        <img id="videoPlayer" alt="视频画面">
                    </div>
                    <div class="card-body">
                        <div class="video-actions">
                            <button class="btn" id="streamStartBtn">开始推流</button>
                            <button class="btn secondary" id="streamStopBtn" disabled>停止推流</button>
                            <button class="btn success" id="snapshotBtn">抓拍</button>
                            <button class="btn danger" id="recordBtn">录制</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="stack">
                <div class="card">
                    <div class="card-head">外设控制</div>
                    <div class="card-body">
                        <div class="control-item">
                            <div class="row"><span class="label">LED 照明</span><input class="switch" type="checkbox" id="led_sw"></div>
                            <div class="row"><input type="range" id="led_br" min="0" max="100" value="50"><span id="led_text">50%</span></div>
                        </div>
                        <div class="control-item">
                            <div class="row"><span class="label">直流风扇</span><input class="switch" type="checkbox" id="motor_sw"></div>
                            <div class="row"><input type="range" id="motor_sp" min="0" max="100" value="30"><span id="motor_text">30%</span></div>
                            <div class="control-actions">
                                <button class="btn secondary" id="dir_f">正转</button>
                                <button class="btn secondary" id="dir_r">反转</button>
                            </div>
                        </div>
                        <div class="control-item" style="margin-bottom:0;">
                            <div class="row"><span class="label">蜂鸣器</span><input class="switch" type="checkbox" id="buzzer_sw"></div>
                        </div>
                    </div>
                </div>

                <div class="card grow">
                    <div class="card-head">运行日志</div>
                    <div class="log-box" id="log_box"></div>
                </div>
            </div>
        </div>
    </section>

    <section id="history" class="page">
        <div class="history-grid">
            <aside class="stack">
                <div class="card">
                    <div class="card-head">历史查询</div>
                    <div class="card-body">
                        <div class="row">
                            <span>设备</span>
                            <select id="history_device">
                                <option value="temp">温度</option>
                                <option value="humi">湿度</option>
                                <option value="light">光照</option>
                                <option value="ir">红外</option>
                            </select>
                        </div>
                        <div class="row">
                            <span>条数</span>
                            <input id="history_limit" type="number" min="1" max="200" value="20" style="width:90px;">
                        </div>
                        <button class="btn" id="historyQueryBtn" style="width:100%;margin-top:12px;">查询历史</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-head">媒体与日志</div>
                    <div class="card-body">
                        <div class="media-actions">
                            <button class="btn success" id="photosBtn">照片</button>
                            <button class="btn warning" id="videosBtn">视频</button>
                            <button class="btn secondary" id="logsBtn">日志</button>
                        </div>
                    </div>
                </div>
            </aside>
            <main class="card">
                <div class="card-head">数据历史</div>
                <div class="table-wrap">
                    <table>
                        <thead><tr><th>数值</th><th>设备时间</th><th>入库时间</th></tr></thead>
                        <tbody id="history_body"><tr><td colspan="3">暂无数据</td></tr></tbody>
                    </table>
                </div>
            </main>
        </div>
    </section>
</div>

<div class="modal" id="mediaModal">
    <div class="modal-panel">
        <div class="card-head"><span id="modalTitle">记录</span><button class="btn secondary" id="modalClose">关闭</button></div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
const $ = id => document.getElementById(id);
const state = { currentDir: 0, controlBusy: false, controlPending: false, streaming: false, recording: false, recordBusy: false, statusBusy: false };
const api = {
    startStream: '/api/camera/start_stream',
    stopStream: '/api/camera/stop_stream',
    snapshot: '/api/camera/snapshot',
    startRecord: '/api/camera/start_record',
    stopRecord: '/api/camera/stop_record'
};

function log(text) {
    const now = new Date().toLocaleTimeString();
    const box = $('log_box');
    box.textContent += `[${now}] ${text}\n`;
    box.scrollTop = box.scrollHeight;
}

async function getJson(url, options = {}, timeoutMs = 5000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        const text = await res.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch (_) {}
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        return data;
    } finally {
        clearTimeout(timer);
    }
}

function formatValue(id, value) {
    if (value === undefined || value === null || value === '') return '--';
    if (id === 'ir') return Number(value) === 1 ? '遮挡' : '安全';
    const n = Number(value);
    if (!Number.isFinite(n)) return String(value);
    return (id === 'temp' || id === 'humi') ? n.toFixed(1) : String(n);
}

function formatTime(v) {
    if (v === undefined || v === null || v === '') return '--';
    const n = Number(v);
    if (!Number.isFinite(n) || n <= 0) return String(v);
    const ms = n > 1000000000000 ? n : n * 1000;
    return new Date(ms).toLocaleString();
}

function formatSize(bytes) {
    const n = Number(bytes) || 0;
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
    return `${(n / 1024 / 1024).toFixed(1)} MB`;
}

function setSensor(id, value) {
    const text = formatValue(id, value);
    const val = $(`val_${id}`);
    if (val) val.textContent = text;
    if (id === 'ir' && val) val.style.color = Number(value) === 1 ? 'var(--danger)' : 'var(--success)';
    $('sensor_update_time').textContent = `更新 ${new Date().toLocaleTimeString()}`;
}

async function pollStatus() {
    if (state.statusBusy) return;
    state.statusBusy = true;
    try {
        const data = await getJson('/api/status', {}, 3000);
        ['temp', 'humi', 'light', 'ir'].forEach(id => setSensor(id, data[id]));
        $('conn_status').textContent = '在线';
    } catch (err) {
        $('conn_status').textContent = '离线';
    } finally {
        state.statusBusy = false;
    }
}

function payloadFromUi() {
    return {
        led_on: $('led_sw').checked ? 1 : 0,
        led_br: Number($('led_br').value),
        motor_on: $('motor_sw').checked ? 1 : 0,
        motor_sp: Number($('motor_sp').value),
        motor_dir: state.currentDir,
        buzzer: $('buzzer_sw').checked ? 1 : 0
    };
}

async function sendControl() {
    if (state.controlBusy) {
        state.controlPending = true;
        return;
    }
    state.controlBusy = true;
    state.controlPending = false;
    const body = { type: 'control', payload: payloadFromUi() };
    try {
        const res = await getJson('/api/control', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        }, 3000);
        log(`控制已发布到 MQTT：${res.topic || 'iotgw/dev/cmd/control'}，重复 ${res.repeat || 1} 次`);
    } catch (err) {
        log(`控制失败：${err.message}`);
    } finally {
        state.controlBusy = false;
        if (state.controlPending) setTimeout(sendControl, 120);
    }
}

async function startStream() {
    if (state.streaming) return;
    try {
        $('streamStartBtn').disabled = true;
        const res = await getJson(api.startStream, {}, 8000);
        state.streaming = true;
        $('streamStopBtn').disabled = false;
        $('video_state').textContent = `运行中 ${res.device || ''}`;
        $('videoHint').style.display = 'none';
        $('videoPlayer').style.display = 'block';
        $('videoPlayer').src = `${res.path || '/api/camera/stream'}?t=${Date.now()}`;
        log(`视频推流已启动：${res.backend || 'ffmpeg'} ${res.device || ''}`);
    } catch (err) {
        $('streamStartBtn').disabled = false;
        $('video_state').textContent = '启动失败';
        log(`视频启动失败：${err.message}，请看 data/logs/ffmpeg_stream.log`);
    }
}

async function stopStream() {
    state.streaming = false;
    $('videoPlayer').src = '';
    $('videoPlayer').style.display = 'none';
    $('videoHint').style.display = 'inline';
    $('streamStartBtn').disabled = false;
    $('streamStopBtn').disabled = true;
    $('video_state').textContent = '未启动';
    try { await getJson(api.stopStream, {}, 3000); } catch (_) {}
    log('视频推流已停止');
}

async function takeSnapshot() {
    try {
        const res = await getJson(api.snapshot, {}, 8000);
        log(`抓拍完成，已保存到：${res.file || ''}。可在“历史记录 / 照片”中查看和下载。`);
    } catch (err) {
        log(`抓拍失败：${err.message}`);
    }
}

async function toggleRecord() {
    if (state.recordBusy) return;
    state.recordBusy = true;
    $('recordBtn').disabled = true;
    try {
        const url = state.recording ? api.stopRecord : api.startRecord;
        const res = await getJson(url, {}, state.recording ? 30000 : 8000);
        state.recording = !state.recording;
        $('recordBtn').textContent = state.recording ? '停止录制' : '录制';
        log(`${state.recording ? '开始录制' : '录制结束，已保存到'}：${res.file || ''}${state.recording ? '' : '。可在“历史记录 / 视频”中下载。'}`);
    } catch (err) {
        log(`录制操作失败：${err.message}`);
    } finally {
        state.recordBusy = false;
        $('recordBtn').disabled = false;
    }
}

async function queryHistory() {
    const id = $('history_device').value;
    const limit = $('history_limit').value;
    const body = $('history_body');
    try {
        const data = await getJson(`/api/history?device_id=${encodeURIComponent(id)}&limit=${limit}`);
        const items = Array.isArray(data.items) ? data.items : [];
        if (!items.length) {
            body.innerHTML = '<tr><td colspan="3">暂无数据</td></tr>';
            return;
        }
        body.innerHTML = items.map(item => `
            <tr>
                <td>${Number(item.value).toFixed(2)}</td>
                <td>${formatTime(item.ts)}</td>
                <td>${formatTime(item.created_at)}</td>
            </tr>
        `).join('');
        log(`历史数据 ${id}：${items.length} 条`);
    } catch (err) {
        body.innerHTML = `<tr><td colspan="3">查询失败：${err.message}</td></tr>`;
    }
}

function openModal(title, html) {
    $('modalTitle').textContent = title;
    $('modalBody').innerHTML = html;
    $('mediaModal').classList.add('show');
}

async function deletePhoto(name) {
    if (!confirm(`删除照片 ${name}？`)) return;
    await getJson(`/api/camera/delete_photo/${encodeURIComponent(name)}`, {}, 5000);
    log(`已删除照片：${name}`);
    await loadPhotos();
}

async function deleteVideo(name) {
    if (!confirm(`删除视频 ${name}？`)) return;
    await getJson(`/api/camera/delete_video/${encodeURIComponent(name)}`, {}, 5000);
    log(`已删除视频：${name}`);
    await loadVideos();
}

async function clearLogs() {
    if (!confirm('清理所有运行日志？')) return;
    const res = await getJson('/api/camera/clear_logs', {}, 5000);
    openModal('运行日志', `<p>已清空 ${res.cleared || 0} 个日志文件内容，文件会继续保留给服务写入。</p>`);
    log(`已清空日志：${res.cleared || 0} 个文件`);
}

async function loadPhotos() {
    try {
        const data = await getJson('/api/camera/photos');
        const photos = Array.isArray(data.photos) ? data.photos.sort((a, b) => b.mtime - a.mtime) : [];
        if (!photos.length) return openModal('照片记录', '<p>暂无照片</p>');
        openModal('照片记录', `<div class="photo-grid">${photos.map(p => `
            <div class="photo-card">
            <a href="/data/media/photos/${encodeURIComponent(p.name)}" target="_blank">
                <img src="/data/media/photos/${encodeURIComponent(p.name)}" alt="${p.name}">
            </a>
            <div>${p.name}</div>
            <button class="btn danger small" onclick="deletePhoto('${p.name.replace(/'/g, "\\'")}')">删除</button>
            </div>`).join('')}</div>`);
    } catch (err) {
        openModal('照片记录', `<p>加载失败：${err.message}</p>`);
    }
}

async function loadVideos() {
    try {
        const data = await getJson('/api/camera/videos');
        const videos = Array.isArray(data.videos) ? data.videos.sort((a, b) => b.mtime - a.mtime) : [];
        if (!videos.length) return openModal('视频记录', '<p>暂无视频</p>');
        openModal('视频记录', `
            <table><thead><tr><th>文件</th><th>大小</th><th>时间</th><th>操作</th></tr></thead>
            <tbody>${videos.map(v => `
                <tr><td>${v.name}</td><td>${formatSize(v.size)}</td><td>${formatTime(v.mtime)}</td>
                <td><span class="actions-inline"><a class="btn secondary small" href="/data/media/videos/${encodeURIComponent(v.name)}" download>下载</a>
                <button class="btn danger small" onclick="deleteVideo('${v.name.replace(/'/g, "\\'")}')">删除</button></span></td></tr>`).join('')}</tbody></table>`);
    } catch (err) {
        openModal('视频记录', `<p>加载失败：${err.message}</p>`);
    }
}

async function loadLogs() {
    try {
        const data = await getJson('/api/camera/logs');
        const logs = Array.isArray(data.logs) ? data.logs.sort((a, b) => b.mtime - a.mtime) : [];
        if (!logs.length) return openModal('运行日志', '<p>暂无日志</p>');
        openModal('运行日志', `
            <button class="btn danger small" onclick="clearLogs()" style="margin-bottom:10px;">清空日志</button>
            <table>
                <thead><tr><th>文件</th><th>大小</th><th>时间</th><th>操作</th></tr></thead>
                <tbody>${logs.map(l => `
                    <tr>
                        <td>${l.name}</td>
                        <td>${(Number(l.size || 0) / 1024).toFixed(1)} KB</td>
                        <td>${formatTime(Number(l.mtime || 0) * 1000)}</td>
                        <td><button class="btn secondary small" onclick="viewLog('${encodeURIComponent(l.name)}')">查看</button></td>
                    </tr>`).join('')}</tbody>
            </table>`);
        return;
        if (!logs.length) return openModal('运行日志', '<p>暂无日志</p>');
        const latest = logs[0];
        const text = await fetch(`/api/camera/logs/${encodeURIComponent(latest.name)}`).then(r => r.text());
        const safe = text.slice(-20000).replace(/[&<>]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]));
        openModal(`运行日志：${latest.name}`, `<button class="btn danger small" onclick="clearLogs()" style="margin-bottom:10px;">清空日志</button><pre class="log-box" style="height:60vh;">${safe}</pre>`);
    } catch (err) {
        openModal('运行日志', `<p>加载失败：${err.message}</p>`);
    }
}

async function viewLog(name) {
    try {
        const text = await fetch(`/api/camera/logs/${name}`).then(r => r.text());
        const safe = text.slice(-20000).replace(/[&<>]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]));
        openModal('运行日志', `<button class="btn secondary small" onclick="loadLogs()" style="margin-bottom:10px;">返回</button><pre class="log-box" style="height:60vh;">${safe}</pre>`);
    } catch (err) {
        openModal('运行日志', `<p>加载失败：${err.message}</p>`);
    }
}

function connectWs() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => { $('conn_status').textContent = '在线'; log('WebSocket 已连接'); };
    ws.onmessage = e => {
        try {
            const msg = JSON.parse(e.data);
            if (msg.type !== 'mqtt_msg' || !msg.topic) return;
            const deviceId = msg.topic.split('/').pop();
            const payload = JSON.parse(msg.payload);
            if (payload.data && payload.data.value !== undefined) setSensor(deviceId, payload.data.value);
        } catch (_) {}
    };
    ws.onclose = () => { $('conn_status').textContent = '离线'; setTimeout(connectWs, 3000); };
    ws.onerror = () => ws.close();
}

function bind() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(x => x.classList.toggle('active', x === btn));
            document.querySelectorAll('.page').forEach(x => x.classList.toggle('active', x.id === btn.dataset.page));
            if (btn.dataset.page === 'history') queryHistory();
        };
    });
    $('streamStartBtn').onclick = startStream;
    $('streamStopBtn').onclick = stopStream;
    $('snapshotBtn').onclick = takeSnapshot;
    $('recordBtn').onclick = toggleRecord;
    $('historyQueryBtn').onclick = queryHistory;
    $('photosBtn').onclick = loadPhotos;
    $('videosBtn').onclick = loadVideos;
    $('logsBtn').onclick = loadLogs;
    $('modalClose').onclick = () => $('mediaModal').classList.remove('show');
    $('mediaModal').onclick = e => { if (e.target.id === 'mediaModal') $('mediaModal').classList.remove('show'); };

    function refreshControlUi() {
        $('dir_f').classList.toggle('active', state.currentDir === 0);
        $('dir_r').classList.toggle('active', state.currentDir === 1);
        $('led_sw').parentElement.classList.toggle('active', $('led_sw').checked);
        $('motor_sw').parentElement.classList.toggle('active', $('motor_sw').checked);
        $('buzzer_sw').parentElement.classList.toggle('active', $('buzzer_sw').checked);
    }

    ['led_sw', 'motor_sw', 'buzzer_sw'].forEach(id => $(id).onchange = () => { refreshControlUi(); sendControl(); });
    $('led_br').oninput = () => { $('led_text').textContent = `${$('led_br').value}%`; };
    $('led_br').onchange = sendControl;
    $('motor_sp').oninput = () => { $('motor_text').textContent = `${$('motor_sp').value}%`; };
    $('motor_sp').onchange = sendControl;
    $('dir_f').onclick = () => { state.currentDir = 0; refreshControlUi(); sendControl(); };
    $('dir_r').onclick = () => { state.currentDir = 1; refreshControlUi(); sendControl(); };
    refreshControlUi();
}

bind();
pollStatus();
setInterval(pollStatus, 1000);
connectWs();
log('页面加载完成');
</script>
</body>
</html>
